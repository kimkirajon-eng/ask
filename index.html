<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💕 Birlikte Uçan Kuşlar - Couple Flappy Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    /* Setup Screen */
    .setup-screen {
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 40px 20px;
      text-align: center;
    }

    .setup-screen.hidden {
      display: none;
    }

    .player-setup {
      background: #f8f9ff;
      padding: 30px;
      border-radius: 15px;
      border: 3px solid #667eea;
    }

    .player-setup.hakki {
      border-color: #764ba2;
    }

    .player-setup h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .player-setup.hakki h2 {
      color: #764ba2;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .player-setup.hakki input:focus,
    .player-setup.hakki textarea:focus {
      border-color: #764ba2;
      box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .secret-setting {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      border-left: 4px solid #ffc107;
    }

    .secret-setting p {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 30px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .btn-love {
      background: #ff6b6b;
      color: white;
      margin-top: 15px;
    }

    .btn-love:hover {
      background: #ff5252;
      box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
    }

    /* Game Screen */
    .game-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      max-height: 800px;
    }

    .game-screen.active {
      display: flex;
    }

    .game-controls {
      background: #f8f9ff;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 2px solid #ddd;
    }

    .player-info {
      font-size: 0.9em;
      color: #333;
      font-weight: bold;
    }

    .player-info.hakki {
      color: #764ba2;
    }

    .score-display {
      font-size: 1.1em;
      color: #667eea;
      font-weight: bold;
    }

    .score-display.hakki {
      color: #764ba2;
    }

    .games-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .game-canvas-wrapper {
      flex: 1;
      position: relative;
      background: #e0f2ff;
      border-right: 2px solid #667eea;
    }

    .game-canvas-wrapper.hakki {
      background: #f0e0ff;
      border-right: none;
      border-top: 2px solid #764ba2;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .deaths-counter {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
    }

    .status-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px 40px;
      border-radius: 10px;
      text-align: center;
      font-size: 1.2em;
      z-index: 100;
      display: none;
    }

    .status-message.show {
      display: block;
      animation: fadeInOut 3s ease-in-out;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
